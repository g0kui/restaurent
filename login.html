<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackly Restaurant</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>
  <main>
    <section class="login-page section" id="section-login">
      <div class="login-container reveal">
        <div style="text-align:center;margin-bottom:2rem">
          <a href="index.html" class="logo" style="justify-content:center;display:inline-flex;align-items:center"><img src="images/logo.png" alt="Stackly logo"><span>Stackly</span></a>
        </div>
        <div class="login-tabs">
          <button class="login-tab active" data-panel="client-panel">Client Login</button>
          <button class="login-tab" data-panel="admin-panel">Admin Login</button>
        </div>
        <div class="login-panel active" id="client-panel">
          <div class="login-card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Sign in to manage reservations, orders, and rewards.</p>
            <form class="login-form" id="client-login-form">
              <div class="form-group"><label>Email</label><input type="email" required placeholder="client@email.com" ></div>
              <div class="form-group"><label>Password</label><input type="password" required placeholder="••••••••" ></div>
              <button type="submit" class="btn btn-primary">Login as Client</button>
            </form>
            <div style="margin-top:1rem;text-align:center">
              <a href="404.html" style="color:var(--primary);font-size:0.95rem">Forgot Password?</a>
            </div>
            <div class="login-divider">or</div>
            <p style="text-align:center;color:var(--muted);font-size:0.85rem">New guest? <a href="sign-in.html" style="color:var(--primary)">Create account at restaurant</a></p>
          </div>
        </div>
        <div class="login-panel" id="admin-panel">
          <div class="login-card">
            <h2>Admin Portal</h2>
            <p class="subtitle">Staff access for restaurant management and analytics.</p>
            <form class="login-form" id="admin-login-form">
              <div class="form-group"><label>Admin ID</label><input type="text" required placeholder="admin@stackly.com" ></div>
              <div class="form-group"><label>Password</label><input type="password" required placeholder="••••••••" ></div>
              <button type="submit" class="btn btn-primary">Login as Admin</button>
            </form>
            <div style="margin-top:1rem;text-align:center">
              <a href="404.html" style="color:var(--primary);font-size:0.95rem">Forgot Password?</a>
            </div>
          </div>
        </div>
      </div>
    </section>
    
    
  </main>
  <footer class="site-footer" id="site-footer"></footer>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
