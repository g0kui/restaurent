<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackly Restaurant</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>
  <main>
    <section class="login-page section" id="section-signin">
      <div class="login-container reveal">
        <div style="text-align:center;margin-bottom:2rem">
          <a href="index.html" class="logo" style="justify-content:center;display:inline-flex;align-items:center"><img src="images/logo.png" alt="Stackly logo"><span>Stackly</span></a>
        </div>
        <div class="login-card" style="max-width:520px;margin-inline:auto;text-align:left">
          <h2>Sign In</h2>
          <p class="subtitle">Enter your details and confirm your password to continue.</p>
          <form class="login-form" id="signin-form">
            <div class="form-group"><label>Name</label><input type="text" name="name" required placeholder="Your full name"></div>
            <div class="form-group"><label>Email</label><input type="email" name="email" required placeholder="you@example.com"></div>
            <div class="form-group"><label>Password</label><input type="password" name="password" required placeholder="Create a password"></div>
            <div class="form-group"><label>Confirm Password</label><input type="password" name="confirmPassword" required placeholder="Confirm your password"></div>
            <button type="submit" class="btn btn-primary">Sign In</button>
          </form>
          <div style="margin-top:1rem;display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap">
           
            <a href="login.html" style="color:var(--primary);font-size:0.95rem">Back to Login</a>
          </div>
        </div>
      </div>
    </section>
  </main>
  <footer class="site-footer" id="site-footer"></footer>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('signin-form');
      if (!form) return;

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }

        const password = form.querySelector('input[name="password"]').value;
        const confirmPassword = form.querySelector('input[name="confirmPassword"]').value;

        if (password !== confirmPassword) {
          alert('Passwords do not match. Please check both password fields.');
          return;
        }

        window.location.href = '404.html';
      });
    });
  </script>
</body>
</html>
